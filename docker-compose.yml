services:
  postgres:
    image: postgres:16
    container_name: kanovi_postgres
    environment:
      POSTGRES_USER: kanovi
      POSTGRES_PASSWORD: kanovi
      POSTGRES_DB: kanovi_pos
    ports:
      - "5432:5432"
    volumes:
      - kanovi_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: kanovi_redis
    ports:
      - "6379:6379"

volumes:
  kanovi_pgdata:
